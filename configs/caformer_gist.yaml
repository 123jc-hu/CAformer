# Full GIST baseline training config for CAFormer.
model: CAFormer
is_training: true
dataset: GIST
n_fold: 5
random_seed: 2024

train_epochs: 400
batch_size: 32
learning_rate: 0.0001
weight_decay: 0.0001
patience: 20

dropout_rate: 0.7
projection_dim: 64
e_layers: 2
d_model: 16
dropout: 0.7
n_heads: 1
